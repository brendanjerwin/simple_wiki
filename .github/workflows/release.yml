name: Release

on:
  release:
    types: [created]
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sign-extension:
    name: Sign Extension
    runs-on: ubuntu-latest
    # Only sign on release events (not on every push/PR)
    if: github.event_name == 'release'
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0

      - name: Restore signed extension cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .signed-xpi-cache
          key: signed-xpi-${{ hashFiles('extensions/online-order-recorder/src/**', 'extensions/online-order-recorder/manifest.json', 'extensions/online-order-recorder/package.json', 'extensions/online-order-recorder/icons/**', 'extensions/online-order-recorder/build-extension.sh', 'static/js/bun.lock') }}
          restore-keys: |
            signed-xpi-

      - name: Build and sign extension
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
          SIGNED_XPI_CACHE_DIR: .signed-xpi-cache
        run: devbox run -- bash scripts/sign-extension.sh

      - name: Upload signed XPI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-xpi
          path: signed-xpi-artifact/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build and Release Go Binary
    runs-on: ubuntu-latest
    needs: [sign-extension]
    # Run builds even if signing was skipped (push/PR) or failed
    if: always() && !cancelled()
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0

      - name: Download signed XPI
        if: needs.sign-extension.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: signed-xpi
          path: signed-xpi-artifact/

      - name: Build Go Binary
        env:
          SIGNED_XPI_PATH: ${{ github.workspace }}/signed-xpi-artifact/simple-wiki-companion.xpi
        run: |
          devbox run build ${{ matrix.goos }} ${{ matrix.goarch }}

      - name: Upload Action Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: simple_wiki-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          path: ./simple_wiki-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: AButler/upload-release-assets@3d6774fae0ed91407dc5ae29d576b166536d1777 # v3.0
        with:
          files: "./simple_wiki-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Home Server
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: simple_wiki-linux-amd64
          path: .

      - name: Verify binary
        run: |
          ls -la simple_wiki-linux-amd64
          file simple_wiki-linux-amd64
          chmod +x simple_wiki-linux-amd64

      - name: Setup Tailscale
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d # v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions

      - name: Prepare deployment files
        run: |
          mkdir -p deployment-package
          cp simple_wiki-linux-amd64 deployment-package/
          cp deployment/simple_wiki.service deployment-package/
          cp deployment/deploy.sh deployment-package/
          chmod +x deployment-package/deploy.sh

      - name: Deploy to server
        uses: FarisZR/tailscale-ssh-deploy@8bd320c7dfaa9d766843564c47d5ce67f46e17b4 # v1
        with:
          remote_host: brendanjerwin@wiki
          directory: deployment-package
          remote_destination: /tmp
          post_upload_command: /tmp/deployment-package/deploy.sh "${{ github.event.release.tag_name }}"

      - name: Report deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployed ${{ github.event.release.tag_name }} to wiki"
          else
            echo "Deployment of ${{ github.event.release.tag_name }} to wiki failed"
          fi
