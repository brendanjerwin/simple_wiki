sonar.organization=brendanjerwin
sonar.projectKey=brendanjerwin_simple_wiki

# Go source files live alongside test files throughout the module; use . with
# sonar.test.inclusions to separate them (standard Go/SonarCloud convention).
sonar.sources=.

# Tests are in the same tree — sonar.test.inclusions identifies them.
sonar.tests=.

sonar.test.inclusions=**/*_test.go,static/js/**/*.test.ts,static/js/**/*.test.js,extensions/**/*.test.ts,extensions/**/*.test.js,e2e/**/*.spec.ts,e2e/**/*.test.ts,e2e/global-setup.ts,e2e/global-teardown.ts,e2e/playwright.config.ts,e2e/build-runner.ts,e2e/tests/helpers/**/*.ts,e2e/tests/constants.ts

# Exclusions: generated code, vendor, node_modules, build artifacts.
# cmd/keep-debug, cmd/tasks-debug, and cmd/connector-roundtrip-test
# are single-binary diagnostic CLIs / live-API smoke harnesses; they
# poke wire protocols by hand and have no production callers, so
# coverage targets don't apply (the same way generated code is
# excluded above).
# internal/connectors/engine/testing/** is test-only scaffolding
# (FakeAdapter, FakeBindingStore, FakeClock) consumed by other test
# files; it lives in a regular Go package because external test
# packages have to import it, but it has no production callers and
# coverage targets don't apply — same rationale as the cmd/*-debug
# diagnostic CLIs above.
# scripts/run_go_mutation.sh is a Devbox/CI wrapper around a tested Go
# baseline reader plus gremlins itself; this project has no shell coverage
# reporter, so including it in new-code coverage would make the gate measure
# tooling format rather than executable application behavior.
sonar.exclusions=\
  **/vendor/**,\
  **/gen/**,\
  **/.devbox/**,\
  **/node_modules/**,\
  **/coverage/**,\
  static/js/bun.lock,\
  **/*.pb.go,\
  **/testdata/**,\
  **/*.stories.ts,\
  **/*.stories.js,\
  static/text/**/*.py,\
  cmd/keep-debug/**,\
  cmd/tasks-debug/**,\
  cmd/connector-roundtrip-test/**,\
  scripts/run_go_mutation.sh,\
  internal/connectors/engine/testing/**

# Go coverage report
sonar.go.coverage.reportPaths=coverage.txt

# Frontend (LCOV) coverage reports — main frontend + browser extension + ESLint rules
sonar.javascript.lcov.reportPaths=static/js/coverage/lcov.info,extensions/online-order-recorder/coverage/lcov.info,static/js/coverage/eslint-rules/lcov.info

# S2699: SonarQube doesn't recognize Gomega Expect() or Chai expect() as assertions
# Hardcoded IP addresses in tests: identity_resolver_test.go uses 100.64.0.1 (RFC 6598
# CGNAT range) as a test fixture; it is not a routable public internet address.
sonar.issue.ignore.multicriteria=ginkgoAssertions,chaiAssertionsTs,chaiAssertionsJs,tailscaleTestIp,goTestStringDupes,tsTestStringDupes
sonar.issue.ignore.multicriteria.ginkgoAssertions.ruleKey=go:S2699
sonar.issue.ignore.multicriteria.ginkgoAssertions.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.chaiAssertionsTs.ruleKey=typescript:S2699
sonar.issue.ignore.multicriteria.chaiAssertionsTs.resourceKey=**/*.test.ts
sonar.issue.ignore.multicriteria.chaiAssertionsJs.ruleKey=javascript:S2699
sonar.issue.ignore.multicriteria.chaiAssertionsJs.resourceKey=**/*.test.js
sonar.issue.ignore.multicriteria.tailscaleTestIp.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.tailscaleTestIp.resourceKey=tailscale/identity_resolver_test.go
# S1192: String duplication in test files is normal (It("should not error") etc.)
sonar.issue.ignore.multicriteria.goTestStringDupes.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.goTestStringDupes.resourceKey=**/*_test.go
sonar.issue.ignore.multicriteria.tsTestStringDupes.ruleKey=typescript:S1192
sonar.issue.ignore.multicriteria.tsTestStringDupes.resourceKey=**/*.test.ts

sonar.sourceEncoding=UTF-8
