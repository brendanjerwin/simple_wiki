sonar.organization=brendanjerwin
sonar.projectKey=brendanjerwin_simple_wiki

# Go source files live alongside test files throughout the module; use . with
# sonar.test.inclusions to separate them (standard Go/SonarCloud convention).
sonar.sources=.

# Tests are in the same tree — sonar.test.inclusions identifies them.
sonar.tests=.

sonar.test.inclusions=**/*_test.go,static/js/**/*.test.ts,static/js/**/*.test.js

# Exclusions: generated code, vendor, node_modules, build artifacts
sonar.exclusions=\
  vendor/**,\
  gen/**,\
  static/js/node_modules/**,\
  static/js/gen/**,\
  static/js/coverage/**,\
  static/js/bun.lock,\
  **/*.pb.go,\
  **/testdata/**

# Go coverage report
sonar.go.coverage.reportPaths=coverage.txt

# Frontend (LCOV) coverage report
sonar.javascript.lcov.reportPaths=static/js/coverage/lcov.info

sonar.sourceEncoding=UTF-8
