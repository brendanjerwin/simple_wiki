# revive.toml
# Configuration for revive linter

# Default severity for rules
severity = "warning"

# Enable all rules
enableAllRules = true

[rule.line-length-limit]
disabled = true

[rule.cognitive-complexity]
arguments = [30]

[rule.cyclomatic]
arguments = [25]

[rule.package-comments]
disabled = true

[rule.exported]
disabled = true

[rule.comment-spacings]
disabled = true

[rule.argument-limit]
disabled = true

[rule.add-constant]
arguments = [
  { maxLitCount = "3", allowStrs = "\"\"", allowInts = "0,1,2", allowFloats = "0.0,0.,1.0,1.,2.0,2.", ignoreFuncs = "os\\.*,fmt\\.Println,make" },
]

[rule.max-public-structs]
disabled = true

[rule.dot-imports]
arguments = [
  { allowed-packages = [
    "github.com/onsi/ginkgo/v2",
    "github.com/onsi/gomega",
  ] },
]

[rule.unhandled-error]
# strings.Builder write methods never return errors by design (documented in Go stdlib).
arguments = [
  "strings\\.Builder\\.WriteByte",
  "strings\\.Builder\\.WriteRune",
  "strings\\.Builder\\.WriteString",
]

[rule.unused-parameter]
exclude = ["**/*_test.go"]

[rule.unused-receiver]
# The goldmark NodeRendererFunc interface requires a method receiver but
# wiki_table_renderer doesn't need to access receiver fields
exclude = ["**/wiki_table_renderer.go"]

[rule.flag-parameter]
# The goldmark NodeRendererFunc interface requires an 'entering' bool parameter
exclude = ["**/wiki_image_renderer.go", "**/wiki_table_renderer.go", "**/collapsible_heading_renderer.go", "**/alert_renderer.go", "**/hashtag.go"]

[rule.unchecked-type-assertion]
# Accept `v, _ := m["k"].(T)` as a deliberate "default-to-zero-value"
# read. The connector adapter code reads opaque AdapterState/Vendor
# map subtrees this way extensively — the schema of those maps is
# stable and the zero-value-on-missing-or-wrong-type default is the
# engineered fallback. Requiring a full `if !ok` block at every site
# would clutter the read paths without adding correctness.
arguments = [{ acceptIgnoredAssertionResult = true }]
