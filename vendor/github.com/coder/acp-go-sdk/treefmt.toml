# Tree-wide formatter config. Previously generated by treefmt-nix inside flake.nix.
# Run with `make fmt` (writes) or `make check` (treefmt --fail-on-change).

[formatter.gofmt]
command = "gofmt"
options = ["-w"]
includes = ["*.go"]

# mdsh expands embedded shell blocks; mdformat then normalizes the result.
# mdsh must run first (lower priority) so mdformat has the final say on layout.
[formatter.mdsh]
command = "mdsh"
options = ["--inputs"]
includes = ["*.md", "*.markdown"]
priority = 1

[formatter.mdformat]
command = "mdformat"
includes = ["*.md", "*.markdown"]
priority = 2

[formatter.actionlint]
command = "actionlint"
includes = [".github/workflows/*.yml", ".github/workflows/*.yaml"]

[formatter.zizmor]
command = "zizmor"
options = ["--no-online-audits", "--quiet"]
includes = [".github/workflows/*.yml", ".github/workflows/*.yaml"]
