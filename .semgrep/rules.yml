rules:
  # ============================================================
  # Go Rules
  # ============================================================

  - id: go.no-interface-empty
    languages: [generic]
    message: >-
      Use `any` instead of `interface{}`. See CLAUDE.md: Type Clarity.
    severity: ERROR
    pattern-regex: 'interface\{\}'
    paths:
      include:
        - "*.go"
      exclude:
        - gen/
        - vendor/

  - id: go.no-bare-panic
    languages: [go]
    message: >-
      Don't use panic() in library code. Return an error instead.
      Panics are only acceptable in main.go, tools/, or for invariant
      assertions (document with an INVARIANT ASSERTION comment).
      See CLAUDE.md: No Panics.
    severity: WARNING
    patterns:
      - pattern: panic($ERR)
      - pattern-not-inside: |
          // INVARIANT ASSERTION: ...
          panic($ERR)
    paths:
      exclude:
        - main.go
        - tools/
        - gen/
        - vendor/

  - id: go.no-recover
    languages: [go]
    message: >-
      Don't use recover() to hide panics. Write defensive code to prevent
      panics in the first place. See CLAUDE.md: Do not use recover.
    severity: WARNING
    pattern: recover()
    paths:
      exclude:
        - gen/
        - vendor/

  - id: go.no-bare-haveoccurred
    languages: [go]
    message: >-
      Check for a specific error message, not just that an error occurred.
      Use Expect(err).To(MatchError("specific message")) instead.
      See CLAUDE.md: Testing.
    severity: WARNING
    pattern: Expect($ERR).To(HaveOccurred())
    paths:
      include:
        - "*_test.go"

  - id: go.no-actions-in-ginkgo-it
    languages: [go]
    message: >-
      Ginkgo It blocks should only contain assertions (Expect/Eventually).
      Move setup and actions into BeforeEach blocks.
      See CLAUDE.md: No Actions in It Blocks.
    severity: WARNING
    patterns:
      - pattern: |
          It($DESC, func() {
            ...
            $X := $CALL
            ...
          })
    paths:
      include:
        - "*_test.go"

  # ------------------------------------------------------------
  # Error-mishandling rules (CLAUDE.md: Fixing Problems / Error Handling)
  # ------------------------------------------------------------
  #
  # NOTE on a pattern we deliberately do NOT lint:
  #   "Subscribe returned OK but skipped persist" (handler-returns-nil-without-
  #   completing-promised-steps) requires inter-procedural reasoning that
  #   opengrep cannot do statically. Catch it in code review and integration
  #   tests instead.

  - id: go.error-wrapped-with-percent-v
    languages: [go]
    message: >-
      `fmt.Errorf("...%v", err)` discards the wrapped chain. Use `%w` so
      callers can `errors.Is`/`errors.As` against the cause.
      See CLAUDE.md: Error Wrapping Pattern.
    severity: ERROR
    patterns:
      - pattern: fmt.Errorf($MSG, ..., $ERR)
      - metavariable-regex:
          metavariable: $MSG
          regex: '^"[^"]*%v[^"]*"$'
      - metavariable-regex:
          metavariable: $ERR
          regex: '^err$|^.*Err$'
    paths:
      exclude:
        - gen/
        - vendor/
        - "*_test.go"
        # Parallel error-classification work in flight; re-include after merge.
        - internal/connectors/googletasks/gateway/
        - internal/connectors/googlekeep/gateway/

  - id: go.error-classified-by-status-code-only
    languages: [go]
    message: >-
      Classifying an HTTP response by status code alone obscures the real
      cause. Inspect the body (e.g. parse the Google error reason) and
      dispatch to a specific sentinel. See feedback_never_obscure_errors_at_boundaries.md.
    severity: WARNING
    patterns:
      - pattern-either:
          - pattern: |
              if $RESP.StatusCode == $STATUS {
                  return ..., $ERR
              }
          - pattern: |
              if $RESP.StatusCode >= $STATUS {
                  return ..., $ERR
              }
          - pattern: |
              if $RESP.StatusCode == $STATUS {
                  return $ERR
              }
          - pattern: |
              if $RESP.StatusCode >= $STATUS {
                  return $ERR
              }
      - metavariable-regex:
          metavariable: $ERR
          regex: '^Err[A-Z]'
    paths:
      exclude:
        - gen/
        - vendor/
        - "*_test.go"
        - cmd/
        # Parallel error-classification work in flight; re-include after merge.
        - internal/connectors/googletasks/gateway/
        - internal/connectors/googlekeep/gateway/

  - id: go.handler-returns-nil-after-error-logged
    languages: [go]
    message: >-
      Logging an error and then returning nil is a silent-failure anti-pattern.
      Errors must propagate to the caller. If this is an intentional boundary
      handler (e.g. a job runner that records terminal status separately),
      add `// nosemgrep: go.handler-returns-nil-after-error-logged` with a
      brief justification. See CLAUDE.md: Never Just Log Errors.
    severity: WARNING
    patterns:
      - pattern-either:
          - pattern: |
              if $ERR != nil {
                  ...
                  slog.Error(...)
                  ...
                  return nil
              }
          - pattern: |
              if $ERR != nil {
                  ...
                  log.Printf(...)
                  ...
                  return nil
              }
          - pattern: |
              if $ERR != nil {
                  ...
                  log.Println(...)
                  ...
                  return nil
              }
    paths:
      exclude:
        - gen/
        - vendor/
        - "*_test.go"
        - main.go
        # Parallel error-classification work in flight; re-include after merge.
        - internal/connectors/googletasks/gateway/
        - internal/connectors/googlekeep/gateway/

  - id: go.errors-As-without-target-pointer
    languages: [go]
    message: >-
      `errors.As` requires a pointer-to-target as its second argument; passing
      a non-pointer panics at runtime. Use `&target`. See CLAUDE.md: Custom
      Error Type Pattern.
    severity: ERROR
    patterns:
      - pattern: errors.As($ERR, $TARGET)
      - metavariable-regex:
          metavariable: $TARGET
          regex: '^[^&]'
    paths:
      exclude:
        - gen/
        - vendor/

  # Detects `_ = errReturningCall()` where a function's *sole* return value is
  # discarded. Excludes:
  #   - the canonical `_ = resp.Body.Close()` cleanup idiom (cleanup error path
  #     where there's nothing useful to do)
  #   - `var _ Iface = (*T)(nil)` interface-assertion idiom (no call at all,
  #     compile-time conformance check)
  #   - `_, ok := m[k]` and similar comma-ok forms (those have a non-error
  #     second return, not a discarded error)
  - id: go.error-discarded-with-blank-identifier
    languages: [go]
    message: >-
      Discarding an error with `_ =` swallows failures that may matter to the
      caller. If the error is genuinely irrelevant (e.g. best-effort cleanup),
      add `// nosemgrep: go.error-discarded-with-blank-identifier` with a
      justification comment. See CLAUDE.md: Never Just Log Errors.
    severity: WARNING
    patterns:
      - pattern: _ = $CALL($...ARGS)
      - pattern-not: _ = $X.Close()
      - pattern-not: _ = $X.Close($...ARGS)
      - pattern-not: var _ $TYPE = $EXPR
    paths:
      include:
        - "*.go"
      exclude:
        - gen/
        - vendor/
        - "*_test.go"
        - "*_test_support.go"
        - main.go
        - cmd/
        # The Google Tasks/Keep gateway and Tasks sync packages are being
        # actively reworked by parallel error-classification work. They will be
        # re-included once that work merges and existing discards have been
        # given justifications inline.
        - internal/connectors/googletasks/gateway/
        - internal/connectors/googlekeep/gateway/

  # ============================================================
  # TypeScript / JavaScript Rules
  # ============================================================

  - id: ts.no-console-error-only
    languages: [typescript, javascript]
    message: >-
      Console logging is never sufficient error handling. Errors must be
      communicated to the user through the UX. See CLAUDE.md: Never Just Log Errors.
    severity: WARNING
    pattern: console.error(...)
    paths:
      exclude:
        - "*.test.ts"
        - "*.test.js"
        - "*.stories.ts"
        - e2e/
        - gen/
        - node_modules/

  - id: ts.no-string-error-property
    languages: [typescript]
    message: >-
      Error properties should be typed as `Error | null`, not `string`.
      Keep errors as objects until the UI edge.
      See CLAUDE.md: Keep Errors as Objects Until the UI Edge.
    severity: WARNING
    pattern: "this.error = \"...\""
    paths:
      exclude:
        - "*.test.ts"
        - gen/
        - node_modules/

  - id: ts.no-static-properties-in-lit
    languages: [generic]
    message: >-
      Use @property() and @state() decorators instead of static properties
      in Lit components. See CLAUDE.md: Web Components with Lit.
    severity: WARNING
    pattern-regex: 'static\s+properties\s*='
    paths:
      include:
        - "static/js/**/*.ts"
      exclude:
        - "*.test.ts"
        - "*.stories.ts"
        - gen/
        - node_modules/

  - id: ts.no-opaque-catch-error-strings
    languages: [typescript, javascript]
    message: >-
      Don't discard the original error. Preserve it with
      `this.error = err instanceof Error ? err : new Error(String(err))`.
      See CLAUDE.md: Never Invent Opaque Error Strings.
    severity: WARNING
    patterns:
      - pattern-inside: |
          catch ($E) {
            ...
          }
      - pattern: "this.error = \"...\""
    paths:
      exclude:
        - "*.test.ts"
        - "*.test.js"
        - gen/
        - node_modules/

  - id: go.engine-adapter-call-needs-deadline
    languages: [go]
    message: >-
      Engine→adapter I/O primitive calls MUST wrap ctx via
      e.withRPCDeadline before invocation (panel review round 3,
      Bailis Option A; rules §11.9 and §16.10). Use a derived
      ctx variable (e.g., pullCtx, insCtx, patchCtx, delCtx,
      readCtx, syncCtx, validCtx, seedCtx, rebuildCtx, repatchCtx,
      rpcCtx) and call cancel() before the next iteration or
      return. Calling e.adapter.<Primitive>(ctx, ...) directly
      bypasses the per-RPC deadline and can wedge the engine
      indefinitely on a vendor-side hang. See
      internal/connectors/engine/rpc_deadline.go.
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: e.adapter.PullRemote(ctx, ...)
          - pattern: e.adapter.InsertRemote(ctx, ...)
          - pattern: e.adapter.PatchRemote(ctx, ...)
          - pattern: e.adapter.DeleteRemote(ctx, ...)
          - pattern: e.adapter.ReadRemoteByRef(ctx, ...)
          - pattern: e.adapter.SyncCollectionState(ctx, ...)
          - pattern: e.adapter.RebuildAdapterState(ctx, ...)
          - pattern: e.adapter.SeedBindingState(ctx, ...)
          - pattern: e.adapter.ValidateRemoteBinding(ctx, ...)
          - pattern: e.adapter.FetchRemoteListTitle(ctx, ...)
          - pattern: e.adapter.ListRemoteCollections(ctx, ...)
    paths:
      include:
        - "internal/connectors/engine/*.go"
      exclude:
        - "*_test.go"

  - id: ts.no-actions-in-it-blocks
    languages: [typescript, javascript]
    message: >-
      Test `it` blocks should only contain assertions. Move setup and
      actions into `beforeEach` blocks. See CLAUDE.md: No Actions in It Blocks.
    severity: WARNING
    patterns:
      - pattern: |
          it($DESC, () => {
            ...
            const $X = $CALL;
            ...
          })
      - pattern: |
          it($DESC, async () => {
            ...
            const $X = await $CALL;
            ...
          })
    paths:
      include:
        - "*.test.ts"
        - "*.test.js"
