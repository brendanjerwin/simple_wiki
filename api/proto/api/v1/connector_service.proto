syntax = "proto3";

package api.v1;

import "api/v1/mcp_options.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/brendanjerwin/simple_wiki/gen/go/api/v1;apiv1";

// ConnectorKind disambiguates which remote backend an RPC targets. The
// wiki.connectors.* namespace is reserved per ADR-0009; each connector
// stores its per-user state under wiki.connectors.<kind_slug>.* on the
// caller's profile page.
enum ConnectorKind {
  CONNECTOR_KIND_UNSPECIFIED = 0;
  CONNECTOR_KIND_GOOGLE_KEEP = 1;
  CONNECTOR_KIND_GOOGLE_TASKS = 2;
  // CONNECTOR_KIND_ICLOUD_REMINDERS is reserved for the next bridge.
  CONNECTOR_KIND_ICLOUD_REMINDERS = 3;
}

// ConnectorService binds wiki checklists to remote lists across all
// configured connectors. Per-user only — every method scopes to the
// *calling* user's profile via Tailscale identity. RPCs accept
// connector_kind to disambiguate; per-kind validation happens in the
// handler. The wiki.connectors.* namespace is reserved per ADR-0009.
service ConnectorService {
  option (api.v1.service_description) =
      "Unified connector orchestration: bind wiki checklists to "
      "remote lists across Google Keep, Google Tasks, etc. RPCs accept "
      "connector_kind to disambiguate; per-kind validation happens in "
      "the handler. The wiki.connectors.* namespace is reserved per "
      "ADR-0009. Per-user only — every method scopes to the *calling* "
      "user's profile via Tailscale identity.";

  // BeginAuth starts an OAuth flow for connectors that use a web-server
  // auth-code grant (Google Tasks). For Keep, BeginAuth has no useful
  // output; the caller proceeds straight to CompleteAuth with the
  // browser-captured oauth_token. For Tasks, the response carries the
  // Google authorization URL (with PKCE challenge + state baked in).
  rpc BeginAuth(BeginAuthRequest) returns (BeginAuthResponse) {
    option (api.v1.description) =
        "Start an OAuth flow for the named connector. Required for "
        "Google Tasks (returns the authorization URL the user opens "
        "in their browser); a no-op for Google Keep (whose flow is "
        "single-shot via CompleteAuth).";
  }

  // CompleteAuth finalizes auth state for the calling user. For Keep,
  // exchanges the captured oauth_token for a long-lived master token
  // via gpsoauth and persists wiki.connectors.google_keep.*. For Tasks,
  // exchanges the authorization code (matched against state +
  // code_verifier from BeginAuth) for refresh+access tokens and
  // persists wiki.connectors.google_tasks.*.
  rpc CompleteAuth(CompleteAuthRequest) returns (CompleteAuthResponse) {
    option (api.v1.description) =
        "Complete the OAuth flow and persist credentials on the calling "
        "user's profile. Idempotent: replaces any prior state.";
  }

  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse) {
    option (api.v1.description) =
        "Wipe credentials from the calling user's profile and pause all "
        "bindings for the named connector. Bindings remain on "
        "the profile (paused) so reconnect can resume them with cursors "
        "preserved. Other users' bindings are untouched.";
  }

  rpc GetState(GetStateRequest) returns (GetStateResponse) {
    option (api.v1.description) =
        "Return the calling user's connector state — connected/not, "
        "email, last verified at, and the bindings list. Used by "
        "the profile page connector macros.";
    option (api.v1.read_only) = true;
  }

  // ListRemoteLists enumerates the lists the calling user owns on the
  // remote side (Keep notes, Tasks tasklists, etc.). Used to populate
  // the bind picker in the Checklist component. Returns an
  // auth-revoked error if credentials no longer work.
  rpc ListRemoteLists(ListRemoteListsRequest) returns (ListRemoteListsResponse) {
    option (api.v1.description) =
        "Enumerate the lists the calling user owns on the remote side "
        "(Google Keep list-typed notes, Google Tasks tasklists, etc.). "
        "Returns auth-revoked if credentials no longer work.";
    option (api.v1.read_only) = true;
  }

  rpc ListMyBindings(ListMyBindingsRequest) returns (ListMyBindingsResponse) {
    option (api.v1.description) =
        "Return all of the calling user's bindings for the named "
        "connector with sync status. Used by the profile-page connector "
        "macros to render per-row remove controls.";
    option (api.v1.read_only) = true;
  }

  rpc Bind(BindRequest) returns (BindResponse) {
    option (api.v1.description) =
        "Bind a wiki checklist to a remote list for the calling "
        "user. If remote_list_handle is empty, the connector creates a "
        "new remote list named list_name. Per-user collision rules: a "
        "user cannot bind the same (page, list_name) twice or "
        "bind two different checklists to the same remote list "
        "(returns FAILED_PRECONDITION).";
  }

  rpc Unbind(UnbindRequest) returns (UnbindResponse) {
    option (api.v1.description) =
        "Remove the calling user's binding for (page, list_name) "
        "on the named connector. Wiki data and the remote list are "
        "both left as-is. Idempotent: returns OK whether the "
        "binding existed or not.";
  }

  // GetChecklistBindingState does NOT take connector_kind: at most
  // one connector owns a given (page, list_name) for a given user, so
  // the response identifies which connector (if any) is authoritative.
  rpc GetChecklistBindingState(GetChecklistBindingStateRequest) returns (GetChecklistBindingStateResponse) {
    option (api.v1.description) =
        "Per-(page, list_name) binding state for the calling user, "
        "returning whichever connector (if any) owns the checklist. "
        "Used by the Checklist component on render to decide whether "
        "to show the bind button, an unbind affordance, or "
        "nothing.";
    option (api.v1.read_only) = true;
  }

  rpc ListDeadLetters(ListDeadLettersRequest) returns (ListDeadLettersResponse) {
    option (api.v1.description) =
        "Return the per-binding dead-letter set: items whose "
        "PushFailureCount has reached the dead-letter threshold and "
        "are no longer being attempted on cron ticks. Scoped to the "
        "calling user's profile and the named connector.";
    option (api.v1.read_only) = true;
  }

  rpc ClearDeadLetter(ClearDeadLetterRequest) returns (google.protobuf.Empty) {
    option (api.v1.description) =
        "Reset a dead-lettered item's PushFailureCount to zero so the "
        "next cron tick re-attempts the push. Preserves synced_fp (the "
        "merge-base baseline) so the divergence rule still recomputes "
        "correctly.";
  }
}

// --- Common types ---------------------------------------------------------

// ConnectorState is the full per-user connector configuration as visible
// to the calling user. Credentials are never returned over the wire.
message ConnectorState {
  bool configured = 1;
  string email = 2;
  google.protobuf.Timestamp connected_at = 3;
  google.protobuf.Timestamp last_verified_at = 4;
  int64 poll_interval_seconds = 5;
  repeated BindingState bindings = 6;
  // last_error is populated when the most recent verification call failed.
  ConnectorError last_error = 7;
  // connector_kind is echoed back so the frontend can disambiguate
  // multi-connector responses without tracking the request.
  ConnectorKind connector_kind = 8;
}

// BindingState is a single binding plus its sync health.
message BindingState {
  string page = 1;
  string list_name = 2;
  // remote_list_handle is the connector-agnostic identifier the
  // gateway uses to address the remote list (Keep note id for Keep;
  // Google Tasks tasklist id for Tasks; CalDAV collection href for
  // iCloud Reminders).
  string remote_list_handle = 3;
  // remote_list_title is the human-readable name of the remote list,
  // used by the UI to render a recognizable binding row.
  string remote_list_title = 4;
  google.protobuf.Timestamp bound_at = 5;
  google.protobuf.Timestamp last_pull_at = 6;
  google.protobuf.Timestamp last_push_at = 7;
  google.protobuf.Timestamp last_verified_at = 8;
  ConnectorError last_error = 9;
  // paused is true when the user disconnected the connector —
  // bindings remain on the profile but no cron entries are
  // registered.
  bool paused = 10;
  ConnectorKind connector_kind = 11;
}

// RemoteListSummary describes one of the user's remote lists for the
// bind picker (Keep list-typed note, Tasks tasklist, etc.).
message RemoteListSummary {
  // remote_list_handle is the gateway-level identifier (Keep note id,
  // Tasks tasklist id, etc.).
  string remote_list_handle = 1;
  string title = 2;
  int32 item_count = 3;
}

// ConnectorError is the typed error surfaced to UI when sync or auth
// fails. Branches on `code`, never on `message`.
message ConnectorError {
  enum Code {
    CODE_UNSPECIFIED = 0;
    CODE_INVALID_CREDENTIALS = 1;
    CODE_AUTH_REVOKED = 2;
    CODE_PROTOCOL_DRIFT = 3;
    CODE_RATE_LIMITED = 4;
    CODE_REMOTE_LIST_DELETED = 5;
    CODE_INTERNAL = 99;
  }
  Code code = 1;
  string message = 2;
  google.protobuf.Timestamp occurred_at = 3;
}

// ChecklistBindingState is the response shape the Checklist
// component queries on render — small surface intentionally so we
// don't leak more than the component needs.
message ChecklistBindingState {
  bool connector_configured = 1;
  // current_binding is null when the user has no binding
  // for this checklist (button shows the connector-agnostic
  // "Bind" affordance).
  BindingState current_binding = 2;
  ConnectorError last_error = 3;
}

// --- Request/response messages ---

message BeginAuthRequest {
  ConnectorKind connector_kind = 1;
  // For Tasks: optional caller-supplied login hint (Google account
  // email) so the OAuth consent screen pre-fills. Ignored for Keep.
  string account_email = 2;
}

message BeginAuthResponse {
  // authorization_url is populated for connectors using web-server
  // OAuth (Tasks). Empty for connectors that don't (Keep).
  string authorization_url = 1;
  // state is the opaque correlation token the caller should pass
  // through to CompleteAuth. Empty for connectors that don't need
  // BeginAuth.
  string state = 2;
}

message CompleteAuthRequest {
  ConnectorKind connector_kind = 1;
  // Keep-specific fields. Both required when connector_kind =
  // CONNECTOR_KIND_GOOGLE_KEEP.
  string email = 2;
  // oauth_token is captured by the user from the `oauth_token`
  // HttpOnly cookie at accounts.google.com/EmbeddedSetup. The wiki
  // exchanges it for a long-lived master token via gpsoauth's
  // exchange_token call. See help_google_keep.
  string oauth_token = 3;

  // Tasks-specific fields. Both required when connector_kind =
  // CONNECTOR_KIND_GOOGLE_TASKS. These are populated by the OAuth
  // callback handler after Google redirects.
  string authorization_code = 4;
  string state = 5;
}

message CompleteAuthResponse {
  ConnectorState state = 1;
}

message DisconnectRequest {
  ConnectorKind connector_kind = 1;
}
message DisconnectResponse {
  ConnectorState state = 1;
}

message GetStateRequest {
  ConnectorKind connector_kind = 1;
}
message GetStateResponse {
  ConnectorState state = 1;
}

message ListRemoteListsRequest {
  ConnectorKind connector_kind = 1;
}
message ListRemoteListsResponse {
  repeated RemoteListSummary lists = 1;
}

message ListMyBindingsRequest {
  ConnectorKind connector_kind = 1;
}
message ListMyBindingsResponse {
  repeated BindingState bindings = 1;
}

message BindRequest {
  ConnectorKind connector_kind = 1;
  string page = 2;
  string list_name = 3;
  // remote_list_handle binds to an existing remote list. If
  // empty, the connector creates a new remote list with title =
  // list_name.
  string remote_list_handle = 4;
}
message BindResponse {
  BindingState binding = 1;
}

message UnbindRequest {
  ConnectorKind connector_kind = 1;
  string page = 2;
  string list_name = 3;
}
message UnbindResponse {}

message GetChecklistBindingStateRequest {
  string page = 1;
  string list_name = 2;
}
message GetChecklistBindingStateResponse {
  ChecklistBindingState state = 1;
}

// DeadLetterItem describes one wiki item whose push has reached the
// dead-letter threshold.
message DeadLetterItem {
  // item_uid is the wiki-side stable identifier for the checklist
  // item.
  string item_uid = 1;
  // text is the most recent observed wiki text for the item, used
  // by the macro UI to render a recognizable row label.
  string text = 2;
  // push_failure_count is the consecutive failure count. At-or-above
  // the threshold means the item is currently dead-lettered.
  int32 push_failure_count = 3;
  // last_failure_code is the connector-specific status string for the
  // most recent failed push attempt.
  string last_failure_code = 4;
}

message ListDeadLettersRequest {
  ConnectorKind connector_kind = 1;
  string page = 2;
  string list_name = 3;
}
message ListDeadLettersResponse {
  repeated DeadLetterItem items = 1;
}

message ClearDeadLetterRequest {
  ConnectorKind connector_kind = 1;
  string page = 2;
  string list_name = 3;
  string item_uid = 4;
}
