syntax = "proto3";

package api.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/brendanjerwin/simple_wiki/gen/go/api/v1;apiv1";

service PageManagementService {
  rpc CreatePage(CreatePageRequest) returns (CreatePageResponse);
  rpc ReadPage(ReadPageRequest) returns (ReadPageResponse);
  rpc RenderPage(RenderPageRequest) returns (RenderPageResponse);
  rpc UpdatePage(UpdatePageRequest) returns (UpdatePageResponse);
  rpc UpdatePageContent(UpdatePageContentRequest) returns (UpdatePageContentResponse);
  rpc UpdateWholePage(UpdateWholePageRequest) returns (UpdateWholePageResponse);
  rpc DeletePage(DeletePageRequest) returns (DeletePageResponse);

  // ClearPageContent explicitly clears the markdown content of a page, preserving its frontmatter.
  // This is a destructive operation that requires confirm_clear = true to prevent accidental data loss.
  rpc ClearPageContent(ClearPageContentRequest) returns (ClearPageContentResponse);

  // GenerateIdentifier converts text to a wiki page identifier format.
  // Used by UI to auto-generate identifiers from titles and check availability.
  rpc GenerateIdentifier(GenerateIdentifierRequest) returns (GenerateIdentifierResponse);

  // ListTemplates returns all pages marked as templates (with template: true frontmatter).
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);

  // WatchPage provides real-time streaming updates when a page's content changes.
  // Emits the current version_hash when the content changes on the server.
  // Clients can use this to re-fetch and re-render the page content.
  rpc WatchPage(WatchPageRequest) returns (stream WatchPageResponse);

  // RenderMarkdown renders arbitrary markdown content to HTML.
  // Supports selective template macros (LinkTo, FindBy, etc.) but excludes
  // interactive widget macros (Checklist, Blog) which render as literal text.
  // Used by the chat panel to render assistant messages.
  rpc RenderMarkdown(RenderMarkdownRequest) returns (RenderMarkdownResponse);
}

// Create Page
message CreatePageRequest {
  string page_name = 1;
  string content_markdown = 2;
  // Structured frontmatter data. TOML serialization happens at file persistence time.
  google.protobuf.Struct frontmatter = 3;
  // Optional template identifier. If provided, the template's frontmatter is used as a base,
  // with frontmatter merged on top (overriding template values).
  optional string template = 4;
}

message CreatePageResponse {
  bool success = 1;
  string error = 2;
}

// Read Page
message ReadPageRequest {
  string page_name = 1;
}

message ReadPageResponse {
  string content_markdown = 1;
  string front_matter_toml = 2;
  string rendered_content_html = 3;
  // rendered_content_markdown contains the markdown content after template expansion
  // but before HTML conversion. This is useful for LLM consumption as it provides
  // ~47% token savings compared to HTML while including all template-expanded content
  // like inventory lists from ShowInventoryContentsOf.
  string rendered_content_markdown = 4;
  // version_hash is a SHA256 hash of the content_markdown, used for optimistic concurrency control.
  // Pass this value as expected_version_hash in UpdatePageContentRequest to detect concurrent modifications.
  string version_hash = 5;
}

// Render Page
message RenderPageRequest {
  string page_name = 1;
}

message RenderPageResponse {
  string rendered_content_html = 1;
}

// Update Page
message UpdatePageRequest {
  string page_name = 1;
  string new_content_markdown = 2;
  string new_front_matter_toml = 3;
}

message UpdatePageResponse {
  bool success = 1;
  string error = 2;
}

// Update Page Content
message UpdatePageContentRequest {
  string page_name = 1;
  string new_content_markdown = 2;
  // expected_version_hash is the version_hash from a previous ReadPage call.
  // If provided, the write will fail with ABORTED if the content has changed since the read.
  // Omit to skip version checking (not recommended for concurrent access scenarios).
  optional string expected_version_hash = 3;
  // old_content_markdown, when provided, enables find-and-replace behavior.
  // The RPC will locate old_content_markdown within the current page content and replace
  // exactly that substring with new_content_markdown, leaving the rest of the page intact.
  // Only the first occurrence is replaced. If old_content_markdown appears multiple times,
  // consider using expected_version_hash to guard against concurrent edits.
  // If old_content_markdown is not found in the current content, the RPC returns a NOT_FOUND error.
  // When omitted, new_content_markdown replaces the entire page content (full replacement).
  optional string old_content_markdown = 4;
}

message UpdatePageContentResponse {
  bool success = 1;
  string error = 2;
  // version_hash is the SHA256 hash of the newly written content.
  // Use this as expected_version_hash in the next UpdatePageContentRequest.
  string version_hash = 3;
}

// Clear Page Content
message ClearPageContentRequest {
  string page_name = 1;
  // confirm_clear must be true to prevent accidental data loss.
  bool confirm_clear = 2;
}

message ClearPageContentResponse {
  bool success = 1;
  string error = 2;
}

// Update Whole Page
message UpdateWholePageRequest {
  string page_name = 1;
  string new_whole_markdown = 2; // Markdown including front matter
}

message UpdateWholePageResponse {
  bool success = 1;
  string error = 2;
}

// Delete Page
message DeletePageRequest {
  string page_name = 1;
}

message DeletePageResponse {
  bool success = 1;
  string error = 2;
}

// Generate Identifier
message GenerateIdentifierRequest {
  // The text to convert to an identifier (typically a title).
  string text = 1;

  // If true, add suffix (e.g., _1, _2) to ensure no existing page has this identifier.
  bool ensure_unique = 2;
}

message GenerateIdentifierResponse {
  // The generated identifier (munged to wiki format, possibly with suffix if ensure_unique).
  string identifier = 1;

  // Whether this identifier is available (no existing page with this identifier).
  bool is_unique = 2;

  // Info about the existing page if is_unique is false.
  ExistingPageInfo existing_page = 3;
}

// Info about an existing page (used when identifier already exists).
message ExistingPageInfo {
  // The page identifier.
  string identifier = 1;

  // The page title from frontmatter.
  string title = 2;

  // The inventory.container value if this is an inventory item.
  string container = 3;
}

// List Templates
message ListTemplatesRequest {
  // Template identifiers to exclude from the results (e.g., ["inv_item"]).
  // This allows context-driven filtering of system-integrated templates.
  repeated string exclude_identifiers = 1;
}

message ListTemplatesResponse {
  repeated TemplateInfo templates = 1;
}

// Info about a template page.
message TemplateInfo {
  // The template page identifier.
  string identifier = 1;

  // The page title from frontmatter.
  string title = 2;

  // Optional description from frontmatter.
  string description = 3;
}

// Watch Page
message WatchPageRequest {
  // The page identifier to watch for changes.
  string page_name = 1;

  // Optional: interval in milliseconds for checking updates (default: 1000ms).
  // Minimum 100ms to prevent excessive server load.
  optional int32 check_interval_ms = 2;
}

message WatchPageResponse {
  // The current version_hash of the page content.
  // When this changes, the client should re-fetch the page.
  string version_hash = 1;

  // The file modification time of the page on disk.
  google.protobuf.Timestamp last_modified = 2;
}

// Render Markdown
message RenderMarkdownRequest {
  // The raw markdown content to render.
  string content = 1;

  // Optional page identifier for macro context (e.g., LinkTo resolves relative to this page).
  // Macros are always executed; when a page is provided its frontmatter enriches the context.
  string page = 2;
}

message RenderMarkdownResponse {
  // The rendered HTML content.
  string rendered_html = 1;
}
